version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    ignore:
      # Expo SDK가 버전을 고정 관리하는 패키지들 — 일반 semver bump로 올리면
      # expo-doctor 호환성 검사와 충돌한다. SDK 업그레이드 시 `npx expo install`로 함께 맞춘다.
      - dependency-name: 'expo*'
      - dependency-name: 'react-native*'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
    commit-message:
      prefix: 'ci'
