version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    groups:
      expo-and-react-native:
        patterns:
          - 'expo*'
          - 'react-native*'
          - 'react'
          - 'react-dom'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
    commit-message:
      prefix: 'ci'
