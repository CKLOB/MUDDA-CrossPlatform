name: ✨ 기능 요청
description: 새로운 기능이나 개선 아이디어를 제안해주세요!
title: '[Feature] '
labels: ['feature']
body:
  - type: textarea
    id: background
    attributes:
      label: 💡 배경 및 문제상황
      description: 이 기능이 왜 필요한지, 어떤 문제를 해결하는지 작성해주세요!
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 📃 제안 내용
      description: 어떤 기능을 어떻게 만들지 구체적으로 작성해주세요!
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: ✅ 작업 목록
      description: 필요한 작업을 체크리스트로 쪼개주세요!
      placeholder: |
        - [ ] UI 구현
        - [ ] API 연동
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 🎸 기타
      description: 참고 자료, 디자인 시안 등 공유할 내용이 있다면 작성해주세요!
