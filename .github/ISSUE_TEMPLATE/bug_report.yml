name: 🐛 버그 리포트
description: 동작하지 않거나 잘못 동작하는 부분을 알려주세요!
title: '[Bug] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: 🔍 버그 설명
      description: 어떤 버그인지 간단하게 설명해주세요!
      placeholder: e.g. 로그인 후 홈 화면으로 이동하지 않고 스플래시에 멈춰 있어요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 재현 절차
      description: 버그를 재현할 수 있는 절차를 순서대로 작성해주세요!
      placeholder: |
        1. 앱을 실행한다
        2. 로그인한다
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 기대 동작
      description: 원래라면 어떻게 동작해야 하나요?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 📱 환경
      description: 버그가 발생한 환경을 알려주세요! (Android/iOS/웹)
      placeholder: |
        - 기기: Galaxy S24 / iPhone 15 / Chrome
        - OS: Android 15 / iOS 18 / Windows 11
        - 앱 버전/브랜치: develop
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 🎸 기타
      description: 스크린샷, 로그 등 참고할 만한 자료가 있다면 첨부해주세요!
