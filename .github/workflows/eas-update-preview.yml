name: EAS Update Preview

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  update:
    name: Publish EAS Update preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v9
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish preview update
        run: eas update --branch "pr-${{ github.event.number }}" --message "${{ github.event.pull_request.title }}" --non-interactive

      - name: Comment preview link on PR
        uses: actions/github-script@v9
        with:
          script: |
            const body = `📦 EAS Update 프리뷰가 \`pr-${{ github.event.number }}\` 채널로 게시되었습니다.\n\nExpo 대시보드에서 확인하세요: https://expo.dev/accounts/h4zx7/projects/${context.repo.repo}/updates`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
